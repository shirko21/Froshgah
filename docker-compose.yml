services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flexishop
      POSTGRES_USER: flexishop
      POSTGRES_PASSWORD: flexishop_password
    volumes:
      - flexishop_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexishop -d flexishop"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      WEB_ORIGIN: http://localhost:5000
      DATABASE_URL: postgresql://flexishop:flexishop_password@db:5432/flexishop
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-before-production-123456}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-Site Manager}
    ports:
      - "5000:5000"
    volumes:
      - flexishop_uploads:/app/apps/api/uploads

volumes:
  flexishop_db:
  flexishop_uploads:
